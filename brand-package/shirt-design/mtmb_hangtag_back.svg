<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 750 1200" width="750" height="1200">
  <title>Hang Tag Back — Care Instructions</title>
  <desc>Back side of hang tag. 2.5 inches by 4 inches at 300 DPI. Charcoal on Nexus Green background with terminal-style care instructions.</desc>

  <!-- Background -->
  <rect x="0" y="0" width="750" height="1200" rx="24" fill="#4FBF7B"/>

  <!-- Hole -->
  <circle cx="375" cy="80" r="25" fill="#FFFFFF"/>

  <!-- Small logo -->
  <g transform="translate(375, 230)">
    <g transform="rotate(0)"><path d="M 0 -12 L 14 -72 L 0 -88 L -14 -72 Z" fill="#1A1D1A"/></g>
    <g transform="rotate(60)"><path d="M 0 -12 L 14 -72 L 0 -88 L -14 -72 Z" fill="#1A1D1A"/></g>
    <g transform="rotate(120)"><path d="M 0 -12 L 14 -72 L 0 -88 L -14 -72 Z" fill="#1A1D1A"/></g>
    <g transform="rotate(180)"><path d="M 0 -12 L 14 -72 L 0 -88 L -14 -72 Z" fill="#1A1D1A"/></g>
    <g transform="rotate(240)"><path d="M 0 -12 L 14 -72 L 0 -88 L -14 -72 Z" fill="#1A1D1A"/></g>
    <g transform="rotate(300)"><path d="M 0 -12 L 14 -72 L 0 -88 L -14 -72 Z" fill="#1A1D1A"/></g>
  </g>

  <!-- Terminal header -->
  <text x="375" y="380" text-anchor="middle"
        font-family="Menlo, Consolas, monospace"
        font-size="32" font-weight="600"
        fill="#1A1D1A" letter-spacing="4">$ cat care.md</text>

  <!-- Care lines -->
  <text x="120" y="480" font-family="Menlo, Consolas, monospace" font-size="32" fill="#1A1D1A">Machine wash cold</text>
  <text x="120" y="540" font-family="Menlo, Consolas, monospace" font-size="32" fill="#1A1D1A">Tumble dry low</text>
  <text x="120" y="600" font-family="Menlo, Consolas, monospace" font-size="32" fill="#1A1D1A">Do not bleach</text>
  <text x="120" y="660" font-family="Menlo, Consolas, monospace" font-size="32" fill="#1A1D1A">Iron inside out</text>
  <text x="120" y="720" font-family="Menlo, Consolas, monospace" font-size="32" fill="#1A1D1A">Do not dry clean</text>

  <!-- Divider -->
  <line x1="120" y1="800" x2="630" y2="800" stroke="#1A1D1A" stroke-width="2" opacity="0.4"/>

  <!-- Origin -->
  <text x="375" y="880" text-anchor="middle"
        font-family="Menlo, Consolas, monospace"
        font-size="28" fill="#1A1D1A" opacity="0.8">Designed in Simpsonville, SC</text>
  <text x="375" y="930" text-anchor="middle"
        font-family="Menlo, Consolas, monospace"
        font-size="28" fill="#1A1D1A" opacity="0.8">Printed on demand</text>

  <!-- Materials -->
  <text x="375" y="1030" text-anchor="middle"
        font-family="Menlo, Consolas, monospace"
        font-size="24" fill="#1A1D1A" opacity="0.6">100% cotton</text>

  <!-- Footer -->
  <text x="375" y="1130" text-anchor="middle"
        font-family="Arial, Helvetica, sans-serif"
        font-size="22" fill="#1A1D1A" opacity="0.7">MY TOKENS. MY BUSINESS.™ · © 2026</text>
</svg>
